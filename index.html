        <div class="countdown-section">

            <div class="countdown-period"></div>
        </div>
        <div class="countdown-section">
            <div class="countdown-amount" id="hours"></div>
            <div class="countdown-period"></div>
        </div>
        <div class="countdown-section">
            <div class="countdown-amount" id="minutes"></div>
            <div class="countdown-period"></div>
        </div>
        <div class="countdown-section">
            <div class="countdown-amount" id="seconds"></div>
            <div class="countdown-period"></div>
        </div>
    </div>
    <div class="clearfix"></div>
</div>
<style>
    .countdown-row {
        padding-top: 0 !important;

    @media (max-width: 350px) {
        .countdown-section-seconds {
            display: none !important;
        }
    }
</style>

<style>
    * {
        font-size: 1em;
        padding: 0;
        margin: 0;
        -webkit-box-sizing: border-box;
        -moz-box-sizing: border-box;
        box-sizing: border-box;
    }

    button:active {
        scale: 1.02;
        transition: all 0.3s ease-in-out;
    }


    select {
        width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        appearance: auto !important;
        opacity: 1 !important;
    }

    select[multiple] {
        white-space: inherit;
        height: 60px;
        scrollbar-gutter: stable both;
    }

    select[multiple]:hover {
        overflow-y: auto;
    }

    select {
        background-image: url("/icons/right-arrow.png");
        background-repeat: no-repeat;
        background-position: 97% 50%;
        background-size: 20px;
        appearance: none;
    }

    option {
        display: inline-block;
        margin: 2px;
        font-size: 14px;
        /* Reset font size to prevent side effects */
        padding: 6px 12px;
        border: 1px solid #d4d4d4;
        border-radius: 24px;
    }

    .country-list {
        max-width: 465px;
        min-width: 260px;
    }

    input {
        margin-bottom: 10px;
    }

    input[type="phone"] {
        width: 100% !important;
    }

    .custom-radioButton>input[type="radio"] {
        display: none;
    }

    /* Hover and selected states */
    .custom-radioButton>input[type="radio"]:checked+.radio-icon,
    .custom-radioButton>input[type="radio"]:checked+.radio-text {
        color: #2563EB;
        /* Active state color */
    }

    .custom-radioButton>input[type="radio"]:checked+.radio-icon {
        font-weight: bold;
    }

    .custom-radioButton:hover {
        border-color: #2563EB;
        /* Hover state */
    }

    .custom-radioButton>input[type="radio"]:checked+span {
        background-color: #A6BFF733;
        border-color: #2563EB;
    }

    .iti--allow-dropdown {
        width: 100% !important;
        color: black !important;
    }

    .block {
        height: auto !important;
    }

    @media all and (min-width: 390px) {
        .country-list {
            max-width: 465px;
            min-width: 290px;
        }
    }

    @media all and (min-width: 430px) {
        .country-list {
            max-width: 465px;
            min-width: 315px;
        }
    }
</style>

<div style="width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; background:transparent;">
    <form style="gap: 4px; max-width: min(800px, 90vw); width:100%;overflow:none; display: grid; box-shadow: none; margin-left: auto; padding-top: 0px; margin-right: auto; padding-left: 0px; border-radius: 8px; padding-right: 0px; padding-bottom: 0px; grid-template-columns: repeat(1,1fr)" method="POST" action="https://37753744.aevent.online/registration" target="_top">
        <div style="width: 100%;max-width: calc(90vw - 64px);display: flex;margin:auto; flex-direction: column;gap:4px">
            <div style="width: 100%; display: flex; flex-direction: column;">
                <h1 class="w-full break-words" style="font-weight: bold; font-size: 24px; font-family: sans-serif; color: rgb(75, 85, 99); text-align: center; padding: 0px; pointer-events: none; cursor: default;">
                    {!webinar-subject}</h1>
            </div>
            <div style="width: 100%; display: flex; flex-direction: column;">
                <p class="w-full break-words" style="font-weight: normal; font-size: 14px; font-family: sans-serif; color: rgb(107, 114, 128); text-align: center; padding: 0px; pointer-events: none; cursor: default;">
                    {!webinar-body}</p>
            </div>
            <div style="width: 100%; display: flex; flex-direction: column; padding-bottom:10px;">
                <h1 class="w-full" style="font-weight: bold; font-size: 24px; font-family: sans-serif; color: rgb(75, 85, 99); text-align: center; padding: 0px; pointer-events: none; cursor: default;">
                    {!reg-dayofweek}, {!reg-month} {!reg-dayofmonth}, {!reg-year} at
                    {!reg-timeZone}</h1>
            </div>
            <div style="width: 100%; display: flex; flex-direction: column;">
                <div style="display: flex; flex-direction: column; gap: 6px; width: 100%;">
                    <p style="font-weight: normal; font-size: 14px; font-family: sans-serif; color: rgb(75, 85, 99); outline: none; padding: 0px; width: 100%;">
                        Full Name<span style="color: rgb(220, 38, 38);"> *</span></p><input type="name" id="Full Name" placeholder="Enter Your Full Name" name="name" required="" style="font-size: 14px; background-color: rgb(255, 255, 255); color: rgb(107, 114, 128); padding: 12px 16px; border-radius: 8px; border: 1px solid rgb(203, 213, 224); outline: none; font-family: sans-serif;">
                </div>
            </div>
            <div style="width: 100%; display: flex; flex-direction: column;">
                <div style="display: flex; flex-direction: column; gap: 6px; width: 100%;">
                    <p style="font-weight: normal; font-size: 14px; font-family: sans-serif; color: rgb(75, 85, 99); outline: none; padding: 0px; width: 100%;">
                        Email<span style="color: rgb(220, 38, 38);"> *</span></p><input type="email" id="Email" placeholder="Enter Your Email" name="email" required="" style="font-size: 14px; background-color: rgb(255, 255, 255); color: rgb(107, 114, 128); padding: 12px 16px; border-radius: 8px; border: 1px solid rgb(203, 213, 224); outline: none; font-family: sans-serif;">
                </div>
            </div>
            <div style="width: 100%; display: flex; flex-direction: column;">
                <div style="display: flex; flex-direction: column; gap: 6px; width: 100%;">
                    <p style="font-weight: normal; font-size: 14px; font-family: sans-serif; color: rgb(75, 85, 99); outline: none; padding: 0px; width: 100%;">
                        Phone Number</p><input type="tel" id="phone" placeholder="Enter Your Phone Number" name="phone" style="font-size: 14px; background-color: rgb(255, 255, 255); color: rgb(107, 114, 128); padding: 12px 16px 12px 52px; border-radius: 8px; border: 1px solid rgb(203, 213, 224); outline: none; font-family: sans-serif;">
                </div>
            </div>
            <div style="width: 100%; display: flex; flex-direction: column; padding-top:10px;">
                <button type="submit" id="registernow" value="Register Now" style="font-weight: bold; font-size: 14px; font-family: sans-serif; cursor: pointer; background: rgb(37, 99, 235); color: white; border-radius: 8px; width: 100%; max-width: 80vw; border: 1px solid rgb(37, 99, 235); text-align: center; align-self: center; padding: 8px 16px; box-shadow: none; line-height: 150%;">
                    Register Now</button>
            </div>
        </div>
    </form>
</div>
